version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - .:/app
      - /app/node_modules

  supabase:
    image: supabase/postgres:15.1.0.47
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=your_secure_password
    volumes:
      - supabase_data:/var/lib/postgresql/data

volumes:
  supabase_data: